apiVersion: v1
kind: Pod
metadata:
  name: gospel-db
  namespace: sanctuary-dev
spec:
  containers:
  - env:
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: secret-beako
          key: db_password
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: secret-beako
          key: db_user
    image: postgres:18
    name: gospel-db
    resources:
      requests:
        memory: "1Gi"
        cpu: "1"
      limits:
        memory: "1Gi"
        cpu: "1"
    volumeMounts:
    - name: postgres-data
      mountPath: /var/lib/postgresql/data
  dnsPolicy: ClusterFirst
  restartPolicy: Always
  volumes:
  - name: postgres-data
    persistentVolumeClaim:
      claimName: pvc-beako